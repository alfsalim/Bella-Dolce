services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./prisma_data:/app/prisma
    restart: always

# If you want to use PostgreSQL, uncomment these and change provider in schema.prisma to "postgresql"
